version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stita
      POSTGRES_PASSWORD: stita_password
      POSTGRES_DB: stita_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stita"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stita-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: stita-server
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://stita:stita_password@postgres:5432/stita_db
      - PORT=3001
      - CLIENT_URL=http://localhost:80
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: stita-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
