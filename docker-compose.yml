version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stita
      POSTGRES_PASSWORD: stita_password
      POSTGRES_DB: stita_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stita"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stita-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
